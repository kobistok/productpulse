steps:
  # ── 1. Build Docker image ───────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build
    args:
      - build
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/productpulse/web:$SHORT_SHA
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/productpulse/web:latest
      - --cache-from=$_REGION-docker.pkg.dev/$PROJECT_ID/productpulse/web:latest
      - .

  # ── 2. Push to Artifact Registry ────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: push
    waitFor: [build]
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/productpulse/web

  # ── 3. Run DB migrations ─────────────────────────────────────────────────────
  # Runs `prisma migrate deploy` as a Cloud Run Job before deploying the new
  # service revision, so the schema is always up to date first.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: migrate
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - jobs
      - execute
      - productpulse-migrate
      - --region=$_REGION
      - --wait

  # ── 4. Deploy to Cloud Run ───────────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: deploy
    waitFor: [migrate]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - productpulse
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/productpulse/web:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --service-account=productpulse-sa@$PROJECT_ID.iam.gserviceaccount.com
      - --add-cloudsql-instances=$PROJECT_ID:$_REGION:$_CLOUDSQL_INSTANCE
      - --set-secrets=DATABASE_URL=productpulse-database-url:latest,ANTHROPIC_API_KEY=productpulse-anthropic-key:latest,FIREBASE_CLIENT_EMAIL=productpulse-firebase-client-email:latest,FIREBASE_PRIVATE_KEY=productpulse-firebase-private-key:latest,WORKER_AUTH_TOKEN=productpulse-worker-auth-token:latest
      - --set-env-vars=NODE_ENV=production,GCP_PROJECT_ID=$PROJECT_ID,GCP_LOCATION=$_REGION,CLOUD_TASKS_QUEUE=agent-jobs,FIREBASE_PROJECT_ID=$PROJECT_ID,NEXT_PUBLIC_FIREBASE_PROJECT_ID=$PROJECT_ID,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$PROJECT_ID.firebaseapp.com
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --concurrency=80
      - --timeout=60s

substitutions:
  _REGION: us-central1
  _CLOUDSQL_INSTANCE: productpulse-db

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/productpulse/web:$SHORT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/productpulse/web:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
